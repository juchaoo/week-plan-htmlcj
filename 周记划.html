<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlowWeek Ultra Final</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        bg: 'var(--bg-body)',
                        sidebar: 'var(--bg-sidebar)',
                        textMain: 'var(--text-main)',
                        textSub: 'var(--text-sub)',
                        grid: 'var(--grid-line)',
                        card: 'var(--card-bg)',
                    }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Noto+Sans+JP:wght@300;400;500&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-body: #ffffff;
            --bg-sidebar: rgba(255, 255, 255, 0.98);
            --text-main: #111827;
            --text-sub: #9ca3af;
            --grid-line: #f3f4f6;
            --card-bg: #ffffff;
            --sidebar-width: 320px; 
            --modal-bg: rgba(255, 255, 255, 0.98);
            --accent-focus: #000000;
            --nav-btn-bg: #ffffff;
            --nav-btn-hover: #1f2937;
        }

        .dark {
            --bg-body: #0f0f10;
            --bg-sidebar: rgba(18, 18, 20, 0.98);
            --text-main: #e5e7eb;
            --text-sub: #9ca3af;
            --grid-line: #1f1f22;
            --card-bg: #18181b;
            --modal-bg: rgba(24, 24, 27, 0.98);
            --accent-focus: #ffffff;
            --nav-btn-bg: #18181b;
            --nav-btn-hover: #374151;
        }
        
        body {
            font-family: 'Inter', 'Noto Sans SC', 'Noto Sans JP', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            font-weight: 300; 
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            transition: background-color 0.3s, color 0.3s;
        }

        #app-container { display: flex; width: 100vw; height: 100vh; }

        aside {
            width: var(--sidebar-width);
            min-width: 240px; max-width: 50vw;
            container-type: inline-size; container-name: sidebar;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--grid-line);
            position: relative; flex-shrink: 0;
            display: flex; flex-direction: column;
            padding: 1.5rem; gap: 2rem;
            z-index: 20;
            transition: background-color 0.3s, border-color 0.3s;
        }

        #clock-display { font-size: 22cqw; line-height: 0.9; letter-spacing: -0.05em; }
        #date-display { font-size: 4.5cqw; letter-spacing: 0.1em; }
        #current-task-title { font-size: 8cqw; line-height: 1.1; }
        .info-text { font-size: 3.5cqw; }
        .lang-switch { font-size: 0.75rem; font-weight: 500; color: var(--text-sub); cursor: pointer; transition: color 0.2s; }
        .lang-switch.active { color: var(--text-main); font-weight: 700; }

        #resizer { width: 8px; cursor: col-resize; background: transparent; z-index: 30; margin-left: -4px; margin-right: -4px; flex-shrink: 0; position: relative; }
        #resizer:hover { background: rgba(100,100,100,0.1); }

        main { flex: 1; min-width: 0; display: flex; flex-direction: column; position: relative; background-color: var(--bg-body); transition: background-color 0.3s;}
        .calendar-grid { display: grid; grid-template-columns: 70px repeat(7, minmax(0, 1fr)); height: 100%; }

        .time-label-cell {
            position: relative; height: 100%; transform: translateY(-50%);
            display: flex; align-items: center; justify-content: flex-end; padding-right: 12px;
        }
        .hour-cell:first-child .time-label-cell { transform: none; align-items: flex-start; padding-top: 2px; }

        .day-column { display: grid; grid-template-rows: repeat(24, 1fr); height: 100%; position: relative; }
        .hour-cell { border-bottom: 1px solid var(--grid-line); position: relative; box-sizing: border-box; transition: border-color 0.3s; }
        .half-hour-line { position: absolute; top: 50%; width: 100%; border-bottom: 1px dashed var(--grid-line); opacity: 0.6; pointer-events: none; }

        .nav-circle-btn {
            position: absolute; top: 50%; transform: translateY(-50%);
            width: 24px; height: 24px;
            background: var(--nav-btn-bg); border: 1px solid var(--grid-line); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; opacity: 0; transition: all 0.2s ease;
            z-index: 60; box-shadow: 0 2px 6px rgba(0,0,0,0.1); color: var(--text-sub);
        }
        .nav-circle-btn:hover { background: var(--nav-btn-hover); color: white; border-color: var(--nav-btn-hover); transform: translateY(-50%) scale(1.1); }
        #calendar-header:hover .nav-circle-btn { opacity: 1; }

        .glass-modal { background: var(--modal-bg); box-shadow: 0 40px 80px -20px rgba(0, 0, 0, 0.3); border: 1px solid var(--grid-line); color: var(--text-main); }
        .clean-input { background: transparent; border: none; border-bottom: 1px solid var(--grid-line); width: 100%; padding: 8px 0; font-family: inherit; outline: none; transition: border-color 0.3s; color: var(--text-main); }
        
        .select-menu { 
            position: fixed; z-index: 100; background: var(--modal-bg); 
            border: 1px solid var(--grid-line); border-radius: 12px; 
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.2); 
            padding: 8px; min-width: 200px; 
            transform: translateY(10px); opacity: 0; transition: all 0.2s; pointer-events: none;
        }
        .select-menu.open { transform: translateY(0); opacity: 1; pointer-events: auto; }
        .select-item { 
            padding: 8px 12px; border-radius: 8px; cursor: pointer; 
            display: flex; justify-content: space-between; align-items: center;
            transition: background 0.1s; 
        }
        .select-item:hover { background: rgba(128,128,128,0.1); }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .day-btn {
            flex: 1; text-align: center; padding: 8px 0; font-size: 10px; font-weight: 600;
            border: 1px solid var(--grid-line); border-radius: 6px; cursor: pointer;
            transition: all 0.2s; color: var(--text-sub);
        }
        .day-btn.active { background: var(--text-main); color: var(--bg-body); border-color: var(--text-main); }

        .task-item { display: flex; justify-content: space-between; align-items: baseline; padding: 6px 0; border-bottom: 1px solid rgba(0,0,0,0.03); font-size: 0.75rem; }
    </style>
</head>
<body>

    <div id="app-container">
        <!-- Sidebar -->
        <aside id="sidebar">
            <div class="flex justify-between items-center w-full">
                <div class="flex gap-3 select-none">
                    <span onclick="setLang('en')" id="lang-en" class="lang-switch">EN</span>
                    <span onclick="setLang('zh')" id="lang-zh" class="lang-switch">中</span>
                    <span onclick="setLang('jp')" id="lang-jp" class="lang-switch">日</span>
                </div>
                
                <div class="flex items-center gap-4">
                    <button onclick="triggerImport()" class="text-gray-400 hover:text-purple-500 transition-colors text-[10px] font-bold tracking-widest uppercase">
                        <span id="label-import">IMPORT</span>
                        <input type="file" id="import-input" class="hidden" accept=".json" onchange="importData(event)">
                    </button>
                    <button onclick="exportData()" class="text-gray-400 hover:text-green-500 transition-colors text-[10px] font-bold tracking-widest uppercase">
                        <span id="label-export">EXPORT</span>
                    </button>
                    <button onclick="toggleTheme()" class="text-gray-400 hover:text-gray-800 dark:hover:text-white transition-colors">
                        <svg id="icon-moon" class="w-4 h-4 block dark:hidden" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                        <svg id="icon-sun" class="w-4 h-4 hidden dark:block" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                    </button>
                    <button onclick="resetUI()" class="text-gray-400 hover:text-blue-500 transition-colors">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                    </button>
                </div>
            </div>

            <div class="flex flex-col">
                <h1 id="clock-display" class="font-light text-main -ml-[0.5cqw]">00:00</h1>
                <div class="flex items-center gap-3 mt-2">
                    <div class="h-px w-8 bg-gray-300 dark:bg-gray-700"></div>
                    <p id="date-display" class="font-medium uppercase text-sub">LOADING</p>
                </div>
            </div>

            <div>
                <div class="flex items-center gap-2 mb-4 opacity-0 transition-opacity duration-500" id="live-status-wrapper">
                    <div class="w-1.5 h-1.5 rounded-full bg-textMain animate-pulse"></div>
                    <span id="label-focus" class="info-text font-bold tracking-widest uppercase text-sub">Current Focus</span>
                </div>
                <div id="current-card" class="transition-all border-l-2 border-transparent pl-0">
                    <h2 id="current-task-title" class="font-normal text-textMain mb-4 line-clamp-3">Free Time</h2>
                    <div class="w-full bg-gray-100 dark:bg-gray-800 h-[2px] mb-4 overflow-hidden">
                        <div id="current-progress" class="bg-textMain h-full w-0 transition-all duration-1000 ease-linear"></div>
                    </div>
                    <div class="flex justify-between items-baseline">
                        <p id="current-time-range" class="info-text text-sub font-light tracking-wide">--:--</p>
                        <p id="current-remaining" class="info-text font-medium text-textMain"></p>
                    </div>
                </div>
            </div>

            <div class="flex-1 overflow-hidden flex flex-col border-t border-grid pt-6">
                <h3 id="label-today" class="text-[4.5cqw] font-bold text-sub uppercase tracking-widest mb-4">Today's Plan</h3>
                <div id="todays-list" class="flex-1 overflow-y-auto no-scrollbar pr-1 space-y-1"></div>
            </div>
        </aside>

        <div id="resizer"></div>

        <!-- Main View -->
        <main>
            <header id="calendar-header" class="h-16 bg-bg/95 backdrop-blur z-30 calendar-grid shrink-0 border-b border-grid relative group">
                <div class="nav-circle-btn left-2" onclick="prevWeek()">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"></path></svg>
                </div>
                <div id="week-number-cell" class="border-r border-grid flex items-center justify-center text-[10px] font-bold text-gray-300 dark:text-gray-600 bg-grid/30 tracking-wider">WEEK --</div>
                <div class="nav-circle-btn right-4" onclick="nextWeek()">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"></path></svg>
                </div>
                <button onclick="resetToToday()" id="btn-back-today" class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-textMain text-bg text-[10px] font-bold px-3 py-1 rounded-full shadow-lg opacity-0 pointer-events-none transition-opacity z-50">Back to Today</button>
            </header>

            <div class="flex-1 relative overflow-hidden" id="grid-container">
                <div class="calendar-grid h-full relative" id="calendar-grid">
                    <div class="border-r border-grid day-column bg-grid/20 select-none" id="time-column"></div>
                    <div id="red-line" class="absolute left-0 w-full z-20 pointer-events-none hidden" style="border-top: 1.5px solid #ef4444;">
                        <div class="absolute left-[67px] -top-[4px] w-2 h-2 bg-red-500 rounded-full shadow-sm"></div>
                    </div>
                </div>
            </div>

            <button onclick="openCreateModal()" class="absolute bottom-10 right-10 w-12 h-12 bg-textMain text-bg rounded-full shadow-2xl flex items-center justify-center hover:scale-110 transition-transform active:scale-90 z-40 group">
                <svg class="w-5 h-5 transition-transform group-hover:rotate-90" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"></path></svg>
            </button>
        </main>
    </div>

    <!-- Select Overlap Menu -->
    <div id="select-menu" class="select-menu">
        <div class="text-[10px] font-bold text-textSub uppercase tracking-widest mb-2 px-2">Select Task</div>
        <div id="select-list"></div>
    </div>

    <!-- Modal -->
    <div id="modal-overlay" class="fixed inset-0 bg-black/20 dark:bg-black/60 backdrop-blur-sm z-50 hidden flex items-center justify-center transition-opacity duration-300 opacity-0 cursor-pointer">
        <div class="glass-modal w-[440px] rounded-xl p-10 transform scale-95 transition-transform duration-300 shadow-2xl cursor-default" id="modal-content" onclick="event.stopPropagation()">
            <input type="text" id="input-title" class="text-2xl font-light tracking-tight w-full bg-transparent border-none outline-none placeholder-gray-400 text-textMain mb-6" placeholder="Task Name...">
            <div class="mb-6">
                <label id="lbl-day" class="text-[10px] font-bold text-textSub uppercase tracking-widest mb-2 block">Day of Week</label>
                <div id="input-day-container" class="flex gap-1"></div>
            </div>
            <div class="mb-6 flex gap-4" id="color-picker"></div>
            <div class="grid grid-cols-2 gap-8 mb-6">
                <div>
                    <label id="lbl-start" class="text-[10px] font-bold text-textSub uppercase tracking-widest mb-2 block">Start</label>
                    <input type="time" id="input-start" class="clean-input text-lg">
                </div>
                <div>
                    <div class="flex justify-between items-baseline mb-2">
                        <label id="lbl-end" class="text-[10px] font-bold text-textSub uppercase tracking-widest block">End</label>
                        <label class="flex items-center gap-1.5 cursor-pointer select-none">
                            <input type="checkbox" id="input-next-day" class="w-3 h-3 rounded border-gray-300">
                            <span id="lbl-next-day" class="text-[9px] font-semibold text-textSub uppercase">Next Day</span>
                        </label>
                    </div>
                    <input type="time" id="input-end" class="clean-input text-lg">
                </div>
            </div>
            <div class="space-y-6 mb-6">
                <input type="text" id="input-notes" class="clean-input text-sm" placeholder="Notes...">
                <div class="flex items-center gap-4">
                     <label id="lbl-commute" class="text-[10px] font-bold text-textSub uppercase tracking-widest whitespace-nowrap">Commute</label>
                     <input type="range" id="input-commute" min="0" max="120" step="5" value="0" class="w-full h-0.5 bg-gray-200 dark:bg-gray-700 appearance-none rounded cursor-pointer accent-textMain">
                     <span class="text-xs font-medium text-textMain w-10 text-right" id="commute-val">0m</span>
                </div>
            </div>
            <div class="flex items-center justify-between pt-6 border-t border-grid">
                <div class="flex items-center gap-4">
                    <label class="flex items-center gap-2 cursor-pointer select-none"><input type="checkbox" id="input-daily" class="rounded" onchange="toggleDaily()"><span id="lbl-daily" class="text-xs font-medium text-textMain">Daily</span></label>
                    <label class="flex items-center gap-2 cursor-pointer select-none"><input type="checkbox" id="input-repeat" class="rounded" onchange="toggleRepeat()"><span id="lbl-repeat" class="text-xs font-medium text-textSub">Weekly</span></label>
                </div>
                <div id="repeat-settings" class="hidden flex items-center gap-2 opacity-0 transition-opacity">
                    <input type="number" id="input-repeat-weeks" class="clean-input w-8 text-center py-0 text-xs" placeholder="∞">
                    <span id="lbl-wks" class="text-[10px] text-textSub uppercase">Wks</span>
                </div>
            </div>
            <input type="hidden" id="input-id">
            <input type="hidden" id="input-group-id">
            <input type="hidden" id="input-created">
            <div class="mt-8 flex gap-4">
                <button onclick="saveEvent()" id="btn-save" class="flex-1 bg-textMain text-bg py-4 rounded-lg text-xs font-bold uppercase hover:opacity-80 transition-opacity">Save</button>
                <button onclick="deleteEvent()" id="btn-delete" class="px-6 py-4 text-red-400 hover:text-red-600 text-xs font-bold uppercase hidden">Delete</button>
            </div>
        </div>
    </div>

    <script>
        const I18N = {
            'en': { days:['MON','TUE','WED','THU','FRI','SAT','SUN'], fullDays:['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'], focus: 'Current Focus', free: 'Free Time', today: "TODAY'S PLAN", start: 'Start', end: 'End', notes: 'Notes', commute: 'Commute', day: 'Day of Week', daily: 'Daily', repeat: 'Weekly', stop: 'Stop after', wks: 'Wks', nextDay: 'Next Day', save: 'Save', delete: 'Delete', weekPrefix: 'WEEK', back: 'Back to Today', placeholderTitle: 'Type your task...', placeholderNotes: 'Add details...', confirmDelete: 'Are you sure?', import: 'Import', export: 'Export' },
            'zh': { days:['周一','周二','周三','周四','周五','周六','周日'], fullDays:['周一','周二','周三','周四','周五','周六','周日'], focus: '当前专注', free: '空闲时间', today: "今日计划", start: '开始', end: '结束', notes: '备注', commute: '路程', day: '选择星期', daily: '每天', repeat: '每周', stop: '重复', wks: '周', nextDay: '次日', save: '保存', delete: '删除', weekPrefix: '第几周', back: '回到本周', placeholderTitle: '输入任务名称...', placeholderNotes: '添加详细信息...', confirmDelete: '确定要删除吗？', import: '导入', export: '导出' },
            'jp': { days:['月','火','水','木','金','土','日'], fullDays:['月曜日','火曜日','水曜日','木曜日','金曜日','土曜日','日曜日'], focus: '現在集中', free: '自由時間', today: "今日の予定", start: '開始', end: '終了', notes: 'メモ', commute: '移動', day: '曜日', daily: '毎日', repeat: '毎週', stop: '期間', wks: '週間', nextDay: '翌日', save: '保存', delete: '削除', weekPrefix: '週', back: '今週に戻る', placeholderTitle: 'タスクを入力...', placeholderNotes: '詳細を追加...', confirmDelete: '削除してもよろしいですか？', import: '入力', export: '出力' }
        };

        const PALETTE =[
            { light: '#111827', dark: '#f3f4f6' }, { light: '#57534e', dark: '#d6d3d1' },
            { light: '#be123c', dark: '#fb7185' }, { light: '#c2410c', dark: '#fb923c' },
            { light: '#15803d', dark: '#4ade80' }, { light: '#0e7490', dark: '#22d3ee' },
            { light: '#1d4ed8', dark: '#60a5fa' }, { light: '#4338ca', dark: '#818cf8' },
            { light: '#701a75', dark: '#e879f9' }
        ];

        let currentLang = localStorage.getItem('flowweek_lang') || 'en';
        let isDark = localStorage.getItem('flowweek_dark') === 'true';
        let events = JSON.parse(localStorage.getItem('flowweek_ultra_events')) ||[];
        let currentViewDate = getMonday(new Date());
        let dragData = { active: false, startYPct: 0, colIndex: null, el: null };

        window.onload = () => {
            const savedWidth = localStorage.getItem('flowweek_sidebar_width');
            if(savedWidth) document.documentElement.style.setProperty('--sidebar-width', savedWidth);
            applyTheme(); setLang(currentLang); initColorPicker(); initClock(); setupDrag(); setupResizer(); setupModalOverlay();
            document.body.addEventListener('click', closeSelectMenu);
            document.getElementById('input-commute').addEventListener('input', e => {
                document.getElementById('commute-val').innerText = e.target.value + 'm';
            });
        };

        function getMonday(d) { d = new Date(d); d.setHours(0,0,0,0); const day = d.getDay(), diff = d.getDate() - day + (day == 0 ? -6 : 1); return new Date(d.setDate(diff)); }
        function getWeekNumber(d) { d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate())); d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay()||7)); var yearStart = new Date(Date.UTC(d.getUTCFullYear(),0,1)); return Math.ceil((((d-yearStart)/86400000)+1)/7); }
        function toggleTheme() { isDark = !isDark; localStorage.setItem('flowweek_dark', isDark); applyTheme(); initColorPicker(); loadEvents(); }
        function applyTheme() { if(isDark) document.documentElement.classList.add('dark'); else document.documentElement.classList.remove('dark'); }
        function getThemeColor(palEntry) { return isDark ? palEntry.dark : palEntry.light; }
        function findPaletteEntry(hex) { return PALETTE.find(p => p.light === hex || p.dark === hex) || PALETTE[0]; }

        function resetUI() {
            isDark = false; localStorage.setItem('flowweek_dark', 'false'); applyTheme();
            resetToToday(); document.documentElement.style.setProperty('--sidebar-width', '320px');
            localStorage.removeItem('flowweek_sidebar_width');
            initColorPicker(); loadEvents();
        }

        function setLang(lang) {
            currentLang = lang; localStorage.setItem('flowweek_lang', lang);
            document.querySelectorAll('.lang-switch').forEach(el => el.classList.remove('active'));
            document.getElementById(`lang-${lang}`).classList.add('active');
            const t = I18N[lang];
            document.getElementById('label-focus').innerText = t.focus; document.getElementById('label-today').innerText = t.today;
            document.getElementById('lbl-start').innerText = t.start; document.getElementById('lbl-end').innerText = t.end;
            document.getElementById('lbl-commute').innerText = t.commute; document.getElementById('lbl-repeat').innerText = t.repeat; 
            document.getElementById('lbl-daily').innerText = t.daily; document.getElementById('lbl-next-day').innerText = t.nextDay;
            document.getElementById('lbl-wks').innerText = t.wks; document.getElementById('lbl-day').innerText = t.day;
            document.getElementById('btn-save').innerText = t.save; document.getElementById('btn-delete').innerText = t.delete;
            document.getElementById('btn-back-today').innerText = t.back;
            document.getElementById('label-import').innerText = t.import;
            document.getElementById('label-export').innerText = t.export;
            updateView();
        }

        function updateView() {
            const todayMonday = getMonday(new Date());
            const isCurrentWeek = currentViewDate.getTime() === todayMonday.getTime();
            const btn = document.getElementById('btn-back-today');
            btn.style.opacity = isCurrentWeek ? '0' : '1'; btn.style.pointerEvents = isCurrentWeek ? 'none' : 'auto';
            const weekNum = getWeekNumber(currentViewDate);
            document.getElementById('week-number-cell').innerText = currentLang === 'zh' ? `第 ${weekNum} 周` : `${I18N[currentLang].weekPrefix} ${weekNum}`;
            initGrid(); loadEvents(); initClock();
        }

        function initGrid() {
            const header = document.getElementById('calendar-header'), t = I18N[currentLang];
            const today = new Date(); today.setHours(0,0,0,0);
            header.querySelectorAll('.date-col').forEach(el => el.remove());
            const rightArrow = header.querySelector('.nav-circle-btn.right-4');
            for(let i=0; i<7; i++) {
                let d = new Date(currentViewDate); d.setDate(d.getDate() + i);
                const isToday = d.getTime() === today.getTime();
                const div = document.createElement('div');
                div.className = `date-col flex flex-col items-center justify-center border-r border-grid relative group ${isToday ? 'bg-red-50/50 dark:bg-red-900/10' : ''}`;
                div.innerHTML = `<span class="text-[9px] font-bold tracking-widest ${isToday ? 'text-red-600 dark:text-red-400' : 'text-gray-300 dark:text-gray-600'} mb-1">${t.days[i]}</span><span class="text-lg font-light ${isToday ? 'text-red-600 dark:text-red-400 font-normal' : 'text-textMain'}">${d.getDate()}</span>`;
                header.insertBefore(div, rightArrow);
            }
            const timeCol = document.getElementById('time-column'); timeCol.innerHTML = '';
            for(let i=0; i<24; i++) {
                const div = document.createElement('div'); div.className = 'hour-cell';
                const labelDiv = document.createElement('div'); labelDiv.className = 'time-label-cell';
                labelDiv.innerHTML = `<span class="text-[10px] ${i%2===0 ? 'text-textMain font-medium opacity-90' : 'text-gray-300 dark:text-gray-600 font-light opacity-60'}">${i.toString().padStart(2,'0')}:00</span>`;
                div.appendChild(labelDiv); timeCol.appendChild(div);
            }
            const grid = document.getElementById('calendar-grid'), redLine = document.getElementById('red-line');
            Array.from(grid.children).forEach(c => { if(c!==timeCol && c!==redLine) c.remove(); });
            for(let i=0; i<7; i++) {
                let d = new Date(currentViewDate); d.setDate(d.getDate() + i);
                const isToday = d.getTime() === today.getTime();
                const col = document.createElement('div'); 
                col.className = `day-column border-r border-grid relative group transition-colors ${isToday ? 'bg-red-50/50 dark:bg-red-900/10' : 'hover:bg-gray-50/30 dark:hover:bg-white/5'}`; 
                col.dataset.day = i;
                for(let h=0; h<24; h++) { const cell = document.createElement('div'); cell.className = 'hour-cell w-full h-full'; cell.appendChild(Object.assign(document.createElement('div'), {className:'half-hour-line'})); col.appendChild(cell); }
                grid.insertBefore(col, redLine);
            }
        }

        function loadEvents() {
            document.querySelectorAll('.event-card, .commute-card').forEach(e => e.remove());
            const viewStartTs = currentViewDate.getTime(), oneWeekMs = 7 * 24 * 60 * 60 * 1000;
            events.forEach(ev => {
                let isValidWeek = true;
                if (ev.repeat || ev.daily) {
                     let eventStartWeek = ev.weekStart || getMonday(new Date(ev.created)).getTime();
                     const diffWeeks = Math.round((viewStartTs - eventStartWeek) / oneWeekMs);
                     if (diffWeeks < 0 || (ev.repeatWeeks > 0 && diffWeeks + 1 > ev.repeatWeeks)) isValidWeek = false;
                } else if (ev.weekStart && ev.weekStart !== viewStartTs) isValidWeek = false;
                if (!isValidWeek) return;

                for(let colIndex=0; colIndex<7; colIndex++) {
                    const col = document.querySelector(`.day-column[data-day="${colIndex}"]`);
                    if(!col) continue;
                    if(ev.daily || (ev.repeat && ev.dayIndex === colIndex) || (!ev.repeat && ev.weekStart === viewStartTs && ev.dayIndex === colIndex)) {
                        const[sH, sM] = ev.start.split(':').map(Number), [eH, eM] = ev.end.split(':').map(Number);
                        let start = sH*60 + sM, end = eH*60 + eM; if(ev.nextDay) end += 1440;
                        renderEventBlock(col, start, Math.min(end, 1440) - start, ev, false, colIndex);
                        if(ev.commute > 0) renderCommuteBlock(col, start - ev.commute, ev.commute);
                    }
                    if(ev.nextDay) {
                        const prevIdx = (colIndex - 1 + 7) % 7;
                        if(ev.daily || (ev.repeat && ev.dayIndex === prevIdx) || (!ev.repeat && ev.dayIndex === prevIdx && ev.weekStart === viewStartTs)) {
                            const[eH, eM] = ev.end.split(':').map(Number);
                            renderEventBlock(col, 0, eH*60 + eM, ev, true, colIndex);
                        }
                    }
                }
            });
        }

        function renderEventBlock(col, topMin, heightMin, ev, isTail, colIndex) {
            if(heightMin <= 0) return;
            const top = (topMin / 1440) * 100, height = (heightMin / 1440) * 100;
            const color = getThemeColor(findPaletteEntry(ev.color));
            
            const el = document.createElement('div');
            el.className = 'event-card absolute w-[94%] left-[3%] z-10 flex flex-col justify-center px-3 py-1 overflow-hidden transition-all cursor-pointer bg-card border-l-[3px]';
            el.style.cssText = `top:${top}%; height:${height}%; background-color:${hexToRgba(color, 0.15)}; border-color:${color}; color:${color};`;
            el.dataset.eventId = ev.id;
            el.innerHTML = `<div class="font-medium text-[11px] leading-tight truncate">${ev.title}</div><div class="text-[9px] opacity-60 truncate mt-[1px]">${ev.start} - ${ev.end}</div>`;
            el.onclick = e => { e.stopPropagation(); handleEventClick(ev, colIndex, e); };
            col.appendChild(el);
        }

        function handleEventClick(targetEv, colIndex, mouseEvent) {
            const col = document.querySelector(`.day-column[data-day="${colIndex}"]`);
            const cards = Array.from(col.querySelectorAll('.event-card'));
            const getB = (el) => { const t = parseFloat(el.style.top), h = parseFloat(el.style.height); return { s: t, e: t + h }; }
            const clickedB = getB(mouseEvent.currentTarget);
            const overlaps = cards.filter(c => { const b = getB(c); return Math.max(clickedB.s, b.s) < Math.min(clickedB.e, b.e); });
            if (overlaps.length > 1) showSelectMenu(overlaps, mouseEvent.clientX, mouseEvent.clientY);
            else openModal(targetEv);
        }

        function showSelectMenu(cards, x, y) {
            const menu = document.getElementById('select-menu'), list = document.getElementById('select-list');
            list.innerHTML = '';
            cards.forEach(card => {
                const ev = events.find(e => e.id === card.dataset.eventId);
                if (!ev) return;
                const item = document.createElement('div');
                item.className = 'select-item text-xs font-medium text-textMain';
                item.innerHTML = `<div class="flex items-center gap-2"><div class="w-2 h-2 rounded-full" style="background:${getThemeColor(findPaletteEntry(ev.color))}"></div>${ev.title}</div><span class="text-[10px] opacity-50">${ev.start}</span>`;
                item.onclick = (e) => { e.stopPropagation(); closeSelectMenu(); openModal(ev); };
                list.appendChild(item);
            });
            menu.style.left = `${x}px`; menu.style.top = `${y}px`; menu.classList.add('open');
        }
        function closeSelectMenu() { document.getElementById('select-menu').classList.remove('open'); }

        function renderCommuteBlock(col, startMin, duration) {
            if(startMin < 0) return;
            const el = document.createElement('div');
            el.className = 'commute-card absolute w-[94%] left-[3%] z-0 flex items-end justify-center pb-0.5 text-[9px] font-bold text-textMain opacity-50';
            el.style.cssText = `top:${(startMin/1440)*100}%; height:${(duration/1440)*100}%; background: repeating-linear-gradient(45deg, var(--grid-line), var(--grid-line) 5px, transparent 5px, transparent 10px);`;
            el.innerText = `${duration}m`;
            col.appendChild(el);
        }

        function initClock() {
            const update = () => {
                const now = new Date(), h = now.getHours(), m = now.getMinutes(), totalMin = h*60 + m;
                document.getElementById('clock-display').innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}`;
                const isCur = getMonday(new Date()).getTime() === currentViewDate.getTime();
                const line = document.getElementById('red-line');
                if(isCur) { line.style.display = 'block'; line.style.top = `${(totalMin/1440)*100}%`; } else { line.style.display = 'none'; }
                updateStatus(now.getDay(), totalMin); renderTodoList(totalMin);
                const dOptions = { year: 'numeric', month: 'long', day: 'numeric' };
                document.getElementById('date-display').innerText = new Date().toLocaleDateString(currentLang === 'en' ? 'en-US' : (currentLang === 'jp' ? 'ja-JP' : 'zh-CN'), dOptions).toUpperCase();
            };
            update(); setInterval(update, 1000);
        }

        function renderTodoList(nowMin) {
            const list = document.getElementById('todays-list'); list.innerHTML = '';
            const todayIdx = (new Date().getDay() + 6) % 7;
            const todaysEvents = events.filter(e => e.daily || (e.repeat && e.dayIndex === todayIdx) || (e.dayIndex === todayIdx && e.weekStart === getMonday(new Date()).getTime()))
                                      .sort((a,b) => a.start.localeCompare(b.start));
            if(!todaysEvents.length) { list.innerHTML = '<div class="text-[10px] text-textSub text-center mt-4">No tasks today</div>'; return; }
            todaysEvents.forEach(e => {
                list.insertAdjacentHTML('beforeend', `<div class="task-item"><span class="truncate pr-2">${e.title}</span><span class="font-mono opacity-80">${e.start}</span></div>`);
            });
        }

        function updateStatus(sysDay, nowMin) {
            const dayIdx = (sysDay + 6) % 7;
            const active = events.find(e => {
                const[sH, sM] = e.start.split(':').map(Number), [eH, eM] = e.end.split(':').map(Number);
                let start = sH*60+sM, end = eH*60+eM; if(e.nextDay) end += 1440;
                return (e.daily || e.dayIndex === dayIdx) && (nowMin >= start && nowMin < end);
            });
            const wrap = document.getElementById('live-status-wrapper'), title = document.getElementById('current-task-title'), bar = document.getElementById('current-progress');
            if(active) {
                wrap.style.opacity = '1'; title.innerText = active.title;
                const[sH, sM] = active.start.split(':').map(Number),[eH, eM] = active.end.split(':').map(Number);
                let start = sH*60+sM, end = eH*60+eM; if(active.nextDay) end += 1440;
                bar.style.width = `${Math.min(100, Math.max(0, ((nowMin - start)/(end - start))*100))}%`;
                bar.style.backgroundColor = getThemeColor(findPaletteEntry(active.color));
                document.getElementById('current-time-range').innerText = `${active.start} - ${active.end}`;
                document.getElementById('current-remaining').innerText = `-${Math.floor(end - nowMin)}m`;
            } else {
                wrap.style.opacity = '0'; title.innerText = I18N[currentLang].free; bar.style.width = "0%";
                document.getElementById('current-time-range').innerText = ""; document.getElementById('current-remaining').innerText = "";
            }
        }

        function prevWeek() { currentViewDate.setDate(currentViewDate.getDate() - 7); updateView(); }
        function nextWeek() { currentViewDate.setDate(currentViewDate.getDate() + 7); updateView(); }
        function resetToToday() { currentViewDate = getMonday(new Date()); updateView(); }

        function openCreateModal(day, sMin, eMin) { 
            resetForm(); if(day===undefined) day = (new Date().getDay()+6)%7;
            const snap = m => Math.round(m/15)*15;
            sMin = snap(sMin || 480); eMin = snap(eMin || sMin + 60);
            const btn = document.querySelector(`.day-btn[data-day="${day}"]`);
            if(btn) btn.classList.add('active');
            document.getElementById('input-start').value = minToTime(sMin); document.getElementById('input-end').value = minToTime(eMin);
            document.getElementById('btn-delete').classList.add('hidden'); showModal(); 
        }

        function openModal(ev) {
            resetForm(); 
            const groupId = ev.groupId || ev.id;
            const related = events.filter(e => e.groupId === groupId || e.id === groupId);
            
            document.getElementById('input-id').value = ev.id;
            document.getElementById('input-group-id').value = groupId;
            document.getElementById('input-title').value = ev.title;
            
            related.forEach(e => {
                const btn = document.querySelector(`.day-btn[data-day="${e.dayIndex}"]`);
                if(btn) btn.classList.add('active');
            });

            document.getElementById('input-start').value = ev.start; 
            document.getElementById('input-end').value = ev.end;
            document.getElementById('input-notes').value = ev.notes||''; 
            document.getElementById('input-commute').value = ev.commute||0;
            document.getElementById('commute-val').innerText = (ev.commute||0)+'m';
            document.getElementById('input-repeat').checked = ev.repeat; 
            document.getElementById('input-next-day').checked = ev.nextDay;

            if(related.length === 7) document.getElementById('input-daily').checked = true;
            
            toggleRepeat();
            const dots = document.getElementById('color-picker').children; 
            Array.from(dots).forEach(d => { if(d.dataset.color===ev.color) d.click(); });
            document.getElementById('btn-delete').classList.remove('hidden'); 
            showModal();
        }

        function saveEvent() {
            const existingGroupId = document.getElementById('input-group-id').value;
            const title = document.getElementById('input-title').value || "Untitled";
            const start = document.getElementById('input-start').value, end = document.getElementById('input-end').value;
            const color = document.querySelector('#color-picker .ring-1').dataset.color;
            const notes = document.getElementById('input-notes').value || "";
            const commute = parseInt(document.getElementById('input-commute').value) || 0;
            const nextDay = document.getElementById('input-next-day').checked;
            const repeat = document.getElementById('input-repeat').checked;
            const repeatWeeks = repeat ? (parseInt(document.getElementById('input-repeat-weeks').value) || 0) : 0;
            
            const selectedDays = Array.from(document.querySelectorAll('.day-btn.active')).map(b => parseInt(b.dataset.day));
            if(!nextDay && start >= end) { alert('Time Error'); return; }
            if(!selectedDays.length) return;

            if(existingGroupId) {
                events = events.filter(e => (e.groupId !== existingGroupId && e.id !== existingGroupId));
            }

            const newGroupId = Date.now().toString();
            selectedDays.forEach((d, idx) => {
                events.push({ 
                    id: (Date.now() + idx + 100).toString(), 
                    groupId: newGroupId,
                    created: Date.now(), 
                    weekStart: currentViewDate.getTime(), 
                    dayIndex: d, title, start, end, color, notes, commute, 
                    daily: false, 
                    repeat, nextDay, repeatWeeks 
                });
            });

            localStorage.setItem('flowweek_ultra_events', JSON.stringify(events)); 
            closeModal(); loadEvents();
            const now = new Date();
            updateStatus(now.getDay(), now.getHours()*60+now.getMinutes());
            renderTodoList(now.getHours()*60+now.getMinutes());
        }

        function deleteEvent() {
            const groupId = document.getElementById('input-group-id').value;
            const id = document.getElementById('input-id').value;
            const targetId = groupId || id;
            if(targetId) {
                events = events.filter(e => (e.groupId !== targetId && e.id !== targetId));
                localStorage.setItem('flowweek_ultra_events', JSON.stringify(events));
                closeModal(); loadEvents();
                const now = new Date();
                updateStatus(now.getDay(), now.getHours()*60+now.getMinutes());
                renderTodoList(now.getHours()*60+now.getMinutes());
            }
        }

        function toggleDaily() {
            const isDaily = document.getElementById('input-daily').checked;
            document.querySelectorAll('.day-btn').forEach(btn => {
                if(isDaily) btn.classList.add('active');
                else btn.classList.remove('active');
            });
            if(isDaily) {
                document.getElementById('input-repeat').checked = true;
                toggleRepeat();
            }
        }

        function toggleRepeat() {
            const s = document.getElementById('repeat-settings');
            if(document.getElementById('input-repeat').checked) {
                s.classList.remove('hidden');
                setTimeout(()=>s.classList.add('opacity-100'),10);
            } else {
                s.classList.add('hidden');
            }
        }
        
        function resetForm() {
            document.getElementById('input-id').value="";
            document.getElementById('input-group-id').value="";
            document.getElementById('input-title').value="";
            document.getElementById('input-notes').value="";
            document.getElementById('input-commute').value=0;
            document.getElementById('commute-val').innerText="0m";
            document.getElementById('input-repeat').checked=false;
            document.getElementById('input-daily').checked=false;
            document.getElementById('input-next-day').checked=false; 
            document.getElementById('input-repeat-weeks').value="";
            
            const container = document.getElementById('input-day-container');
            container.innerHTML = "";
            I18N[currentLang].days.forEach((d, i) => {
                const b = document.createElement('div');
                b.className = 'day-btn';
                b.innerText = d;
                b.dataset.day = i;
                b.onclick = () => {
                    b.classList.toggle('active');
                    if(!b.classList.contains('active')) {
                        document.getElementById('input-daily').checked = false;
                    } else {
                        const allActive = Array.from(document.querySelectorAll('.day-btn')).every(btn => btn.classList.contains('active'));
                        if(allActive) {
                            document.getElementById('input-daily').checked = true;
                            document.getElementById('input-repeat').checked = true;
                            toggleRepeat();
                        }
                    }
                };
                container.appendChild(b);
            });
            toggleRepeat();
        }

        function showModal() { const o=document.getElementById('modal-overlay'); o.classList.remove('hidden'); setTimeout(()=>o.classList.remove('opacity-0'),10); }
        function closeModal() { const o=document.getElementById('modal-overlay'); o.classList.add('opacity-0'); setTimeout(()=>o.classList.add('hidden'),200); }
        function initColorPicker() { const c=document.getElementById('color-picker'); c.innerHTML=''; PALETTE.forEach(p=>{ const d=document.createElement('div'); d.className='w-5 h-5 rounded-full cursor-pointer border hover:scale-125 transition-transform'; d.style.backgroundColor=getThemeColor(p); d.dataset.color=p.light; d.onclick=()=>{ Array.from(c.children).forEach(x=>x.classList.remove('ring-1','ring-offset-2','ring-gray-400')); d.classList.add('ring-1','ring-offset-2','ring-gray-400'); }; c.appendChild(d); }); }
        
        function setupResizer() { 
            const r=document.getElementById('resizer'); let active=false;
            r.onmousedown = () => { active=true; document.body.style.cursor='col-resize'; };
            document.onmousemove = e => { if(!active) return; let w=e.clientX; if(w>240 && w<window.innerWidth/2) { document.documentElement.style.setProperty('--sidebar-width', w+'px'); localStorage.setItem('flowweek_sidebar_width', w+'px'); } };
            document.onmouseup = () => { active=false; document.body.style.cursor=''; };
        }
        
        function setupModalOverlay() { document.getElementById('modal-overlay').onclick = e => { if(e.target.id==='modal-overlay') closeModal(); }; }
        
        function setupDrag() {
            const g = document.getElementById('calendar-grid');
            const snap = m => Math.round(m / 15) * 15;
            g.onmousedown = e => {
                const col = e.target.closest('.day-column'); if (!col || e.target.closest('.event-card')) return;
                dragData.active = true; dragData.colIndex = col.dataset.day;
                const r = col.getBoundingClientRect(); dragData.startYPct = ((e.clientY - r.top) / col.clientHeight) * 100;
                dragData.el = document.createElement('div');
                dragData.el.className = 'absolute bg-textMain/10 border-l-2 border-textMain/30 w-[94%] left-[3%] z-20';
                dragData.el.style.top = dragData.startYPct + '%';
                dragData.el.innerHTML = `
                    <div id="drag-s-lab" class="absolute -top-6 left-0 bg-textMain text-bg text-[9px] px-1 rounded font-bold shadow-sm"></div>
                    <div id="drag-e-lab" class="absolute -bottom-6 left-0 bg-textMain text-bg text-[9px] px-1 rounded font-bold shadow-sm"></div>
                `;
                col.appendChild(dragData.el);
            };
            window.onmousemove = e => {
                if (!dragData.active) return;
                const col = dragData.el.parentElement, r = col.getBoundingClientRect();
                let y = Math.max(0, Math.min(col.clientHeight, e.clientY - r.top));
                const cur = (y / col.clientHeight) * 100;
                const topPct = Math.min(dragData.startYPct, cur), hPct = Math.abs(cur - dragData.startYPct);
                dragData.el.style.top = topPct + '%'; dragData.el.style.height = hPct + '%';
                const sMin = snap((topPct / 100) * 1440), eMin = snap(((topPct + hPct) / 100) * 1440);
                document.getElementById('drag-s-lab').innerText = minToTime(sMin);
                document.getElementById('drag-e-lab').innerText = minToTime(eMin);
            };
            window.onmouseup = () => {
                if (!dragData.active) return; dragData.active = false;
                const t = parseFloat(dragData.el.style.top), h = parseFloat(dragData.el.style.height);
                dragData.el.remove(); if (h > 0.5) openCreateModal(dragData.colIndex, (t / 100) * 1440, ((t + h) / 100) * 1440);
            };
        }

        function hexToRgba(hex,a){ let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16); return `rgba(${r},${g},${b},${a})`; }
        function minToTime(m){ let h=Math.floor(m/60),min=Math.round(m%60); return `${h.toString().padStart(2,'0')}:${min.toString().padStart(2,'0')}`; }

        function exportData() {
            const dataStr = JSON.stringify(events, null, 2);
            const link = document.createElement('a');
            link.href = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
            link.download = 'flowweek_data.json'; link.click();
        }
        function triggerImport() { document.getElementById('import-input').click(); }
        function importData(e) {
            const file = e.target.files[0]; if(!file) return;
            const reader = new FileReader();
            reader.onload = e => { try { events = JSON.parse(e.target.result); localStorage.setItem('flowweek_ultra_events', JSON.stringify(events)); loadEvents(); renderTodoList(); alert('Import OK'); } catch(err){ alert('Error'); } };
            reader.readAsText(file);
        }
    </script>
</body>
