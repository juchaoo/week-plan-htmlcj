<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlowWeek Ultra Final</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        bg: 'var(--bg-body)',
                        sidebar: 'var(--bg-sidebar)',
                        textMain: 'var(--text-main)',
                        textSub: 'var(--text-sub)',
                        grid: 'var(--grid-line)',
                        card: 'var(--card-bg)',
                    }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Noto+Sans+JP:wght@300;400;500&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-body: #ffffff;
            --bg-sidebar: rgba(255, 255, 255, 0.98);
            --text-main: #111827;
            --text-sub: #9ca3af;
            --grid-line: #f3f4f6;
            --card-bg: #ffffff;
            --sidebar-width: 320px; 
            --modal-bg: rgba(255, 255, 255, 0.98);
            --accent-focus: #000000;
            --nav-btn-bg: #ffffff;
            --nav-btn-hover: #1f2937;
        }

        .dark {
            --bg-body: #0f0f10;
            --bg-sidebar: rgba(18, 18, 20, 0.98);
            --text-main: #e5e7eb;
            --text-sub: #9ca3af;
            --grid-line: #1f1f22;
            --card-bg: #18181b;
            --modal-bg: rgba(24, 24, 27, 0.98);
            --accent-focus: #ffffff;
            --nav-btn-bg: #18181b;
            --nav-btn-hover: #374151;
        }
        
        body {
            font-family: 'Inter', 'Noto Sans SC', 'Noto Sans JP', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            font-weight: 300; 
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            transition: background-color 0.3s, color 0.3s;
        }

        #app-container { display: flex; width: 100vw; height: 100vh; }

        /* --- Sidebar --- */
        aside {
            width: var(--sidebar-width);
            min-width: 240px; max-width: 50vw;
            container-type: inline-size; container-name: sidebar;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--grid-line);
            position: relative; flex-shrink: 0;
            display: flex; flex-direction: column;
            padding: 5cqw; gap: 4cqw;
            z-index: 20;
            transition: background-color 0.3s, border-color 0.3s;
        }

        #clock-display { font-size: 22cqw; line-height: 0.9; letter-spacing: -0.05em; }
        #date-display { font-size: 3.5cqw; letter-spacing: 0.1em; }
        #current-task-title { font-size: 8cqw; line-height: 1.1; }
        .info-text { font-size: 3.5cqw; }
        .lang-switch { font-size: 3cqw; font-weight: 500; color: var(--text-sub); cursor: pointer; transition: color 0.2s; }
        .lang-switch.active { color: var(--text-main); font-weight: 700; }

        #resizer { width: 8px; cursor: col-resize; background: transparent; z-index: 30; margin-left: -4px; margin-right: -4px; flex-shrink: 0; position: relative; }
        #resizer:hover { background: rgba(100,100,100,0.1); }

        /* --- Main View --- */
        main { flex: 1; min-width: 0; display: flex; flex-direction: column; position: relative; background-color: var(--bg-body); transition: background-color 0.3s;}

        .calendar-grid { display: grid; grid-template-columns: 70px repeat(7, minmax(0, 1fr)); height: 100%; }

        .time-label-cell {
            position: relative; height: 100%; transform: translateY(-50%);
            display: flex; align-items: center; justify-content: flex-end; padding-right: 12px;
        }
        .hour-cell:first-child .time-label-cell { transform: none; align-items: flex-start; padding-top: 2px; }

        .day-column { display: grid; grid-template-rows: repeat(24, 1fr); height: 100%; position: relative; }
        .hour-cell { border-bottom: 1px solid var(--grid-line); position: relative; box-sizing: border-box; transition: border-color 0.3s; }
        .half-hour-line { position: absolute; top: 50%; width: 100%; border-bottom: 1px dashed var(--grid-line); opacity: 0.6; pointer-events: none; }

        .nav-circle-btn {
            position: absolute; top: 50%; transform: translateY(-50%);
            width: 24px; height: 24px;
            background: var(--nav-btn-bg); border: 1px solid var(--grid-line); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; opacity: 0; transition: all 0.2s ease;
            z-index: 60; box-shadow: 0 2px 6px rgba(0,0,0,0.1); color: var(--text-sub);
        }
        .nav-circle-btn:hover { background: var(--nav-btn-hover); color: white; border-color: var(--nav-btn-hover); transform: translateY(-50%) scale(1.1); }
        #calendar-header:hover .nav-circle-btn { opacity: 1; }

        /* Modals */
        .glass-modal { background: var(--modal-bg); box-shadow: 0 40px 80px -20px rgba(0, 0, 0, 0.3); border: 1px solid var(--grid-line); color: var(--text-main); }
        .clean-input { background: transparent; border: none; border-bottom: 1px solid var(--grid-line); width: 100%; padding: 8px 0; font-family: inherit; outline: none; transition: border-color 0.3s; color: var(--text-main); }
        .clean-input:focus { border-bottom-color: var(--text-main); }
        .clean-input::placeholder { color: var(--text-sub); }
        
        .select-menu { 
            position: fixed; z-index: 100; background: var(--modal-bg); 
            border: 1px solid var(--grid-line); border-radius: 12px; 
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.2); 
            padding: 8px; min-width: 200px; 
            transform: translateY(10px); opacity: 0; transition: all 0.2s; pointer-events: none;
        }
        .select-menu.open { transform: translateY(0); opacity: 1; pointer-events: auto; }
        .select-item { 
            padding: 8px 12px; border-radius: 8px; cursor: pointer; 
            display: flex; justify-content: space-between; align-items: center;
            transition: background 0.1s; 
        }
        .select-item:hover { background: rgba(128,128,128,0.1); }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        input[type="checkbox"] { accent-color: var(--text-main); width: 0.9rem; height: 0.9rem; cursor: pointer; border-color: var(--text-sub); }

        .task-item { display: flex; justify-content: space-between; align-items: baseline; padding: 6px 0; border-bottom: 1px solid rgba(0,0,0,0.03); font-size: 0.75rem; }
        .dark .task-item { border-bottom: 1px solid rgba(255,255,255,0.03); }
        .task-item.past { color: var(--text-sub); opacity: 0.6; text-decoration: line-through; }
        .task-item.current { color: var(--accent-focus); font-weight: 600; }
        .task-item.future { color: var(--text-sub); opacity: 0.9; }
    </style>
</head>
<body>

    <div id="app-container">
        <!-- Sidebar -->
        <aside id="sidebar">
            <div class="mt-[1cqw]">
                <div class="flex justify-between items-start">
                    <h1 id="clock-display" class="font-light text-main -ml-[0.5cqw]">00:00</h1>
                    <div class="flex flex-col items-end gap-2">
                        <div class="flex gap-2 mt-1 select-none">
                            <span onclick="setLang('en')" id="lang-en" class="lang-switch">EN</span>
                            <span class="text-[3cqw] text-gray-300 dark:text-gray-700">|</span>
                            <span onclick="setLang('zh')" id="lang-zh" class="lang-switch">中</span>
                            <span class="text-[3cqw] text-gray-300 dark:text-gray-700">|</span>
                            <span onclick="setLang('jp')" id="lang-jp" class="lang-switch">日</span>
                        </div>
                        
                        <div class="flex items-center gap-3">
                            <!-- Dark Mode Toggle -->
                            <button onclick="toggleTheme()" class="text-gray-400 hover:text-gray-800 dark:hover:text-white transition-colors" title="Toggle Theme">
                                <svg id="icon-moon" class="w-4 h-4 block dark:hidden" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                                <svg id="icon-sun" class="w-4 h-4 hidden dark:block" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                            </button>
                            <!-- Reset View Button -->
                            <button onclick="resetUI()" class="text-gray-400 hover:text-blue-500 transition-colors" title="Reset Layout & Theme">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                            </button>
                            <!-- Delete All Button -->
                            <button onclick="confirmDeleteAll()" class="text-gray-400 hover:text-red-500 transition-colors" title="Clear All Data">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                            </button>
                        </div>
                    </div>
                </div>
                <div class="mt-[2cqw] flex items-center gap-3">
                    <div class="h-px w-[6cqw] bg-gray-300 dark:bg-gray-700"></div>
                    <p id="date-display" class="font-medium uppercase text-sub">LOADING</p>
                </div>
            </div>

            <div>
                <div class="flex items-center gap-2 mb-[2cqw] opacity-0 transition-opacity duration-500" id="live-status-wrapper">
                    <div class="w-1.5 h-1.5 rounded-full bg-textMain animate-pulse"></div>
                    <span id="label-focus" class="info-text font-bold tracking-widest uppercase text-sub">Current Focus</span>
                </div>
                <div id="current-card" class="transition-all border-l-2 border-transparent pl-0">
                    <h2 id="current-task-title" class="font-normal text-textMain mb-[2cqw] line-clamp-3 transition-colors">Free Time</h2>
                    <div class="w-full bg-gray-100 dark:bg-gray-800 h-[2px] mb-[2cqw] overflow-hidden">
                        <div id="current-progress" class="bg-textMain h-full w-0 transition-all duration-1000 ease-linear"></div>
                    </div>
                    <div class="flex justify-between items-baseline">
                        <p id="current-time-range" class="info-text text-sub font-light tracking-wide">--:--</p>
                        <p id="current-remaining" class="info-text font-medium text-textMain"></p>
                    </div>
                </div>
            </div>

            <div class="flex-1 overflow-hidden flex flex-col border-t border-grid pt-[3cqw]">
                <h3 id="label-today" class="text-[3cqw] font-bold text-sub uppercase tracking-widest mb-[2cqw]">Today's Plan</h3>
                <div id="todays-list" class="flex-1 overflow-y-auto no-scrollbar pr-1 space-y-1"></div>
            </div>
        </aside>

        <div id="resizer"></div>

        <!-- Main View -->
        <main>
            <header id="calendar-header" class="h-16 bg-bg/95 backdrop-blur z-30 calendar-grid shrink-0 border-b border-grid relative group">
                <div class="nav-circle-btn left-2" onclick="prevWeek()">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"></path></svg>
                </div>
                <div id="week-number-cell" class="border-r border-grid flex items-center justify-center text-[10px] font-bold text-gray-300 dark:text-gray-600 bg-grid/30 tracking-wider">WEEK --</div>
                <div class="nav-circle-btn right-4" onclick="nextWeek()">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"></path></svg>
                </div>
                <button onclick="resetToToday()" id="btn-back-today" class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-textMain text-bg text-[10px] font-bold px-3 py-1 rounded-full shadow-lg opacity-0 pointer-events-none transition-opacity z-50">Back to Today</button>
            </header>

            <div class="flex-1 relative overflow-hidden" id="grid-container">
                <div class="calendar-grid h-full relative" id="calendar-grid">
                    <div class="border-r border-grid day-column bg-grid/20 select-none" id="time-column"></div>
                    <div id="red-line" class="absolute left-0 w-full z-20 pointer-events-none hidden" style="border-top: 1.5px solid #ef4444;">
                        <div class="absolute left-[67px] -top-[4px] w-2 h-2 bg-red-500 rounded-full shadow-sm"></div>
                    </div>
                </div>
            </div>

            <button onclick="openCreateModal()" class="absolute bottom-10 right-10 w-12 h-12 bg-textMain text-bg rounded-full shadow-2xl flex items-center justify-center hover:scale-110 transition-transform active:scale-90 z-40 group">
                <svg class="w-5 h-5 transition-transform group-hover:rotate-90" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"></path></svg>
            </button>
        </main>
    </div>

    <!-- Disambiguation Menu -->
    <div id="select-menu" class="select-menu">
        <div class="text-[10px] font-bold text-textSub uppercase tracking-widest mb-2 px-2">Select Task</div>
        <div id="select-list"></div>
    </div>

    <!-- Modal -->
    <div id="modal-overlay" class="fixed inset-0 bg-black/20 dark:bg-black/60 backdrop-blur-sm z-50 hidden flex items-center justify-center transition-opacity duration-300 opacity-0 cursor-pointer">
        <div class="glass-modal w-[440px] rounded-xl p-10 transform scale-95 transition-transform duration-300 shadow-2xl cursor-default" id="modal-content" onclick="event.stopPropagation()">
            <input type="text" id="input-title" class="text-2xl font-light tracking-tight w-full bg-transparent border-none outline-none placeholder-gray-400 text-textMain mb-6" placeholder="Task Name...">

            <div class="mb-6">
                <label id="lbl-day" class="text-[10px] font-bold text-textSub uppercase tracking-widest mb-2 block">Day of Week</label>
                <div class="relative">
                    <select id="input-day-select" class="clean-input text-sm appearance-none cursor-pointer bg-transparent relative z-10"></select>
                    <div class="absolute right-0 top-2 pointer-events-none text-textSub">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                    </div>
                </div>
            </div>

            <div class="mb-6 flex gap-4" id="color-picker"></div>

            <div class="grid grid-cols-2 gap-8 mb-6">
                <div>
                    <label id="lbl-start" class="text-[10px] font-bold text-textSub uppercase tracking-widest mb-2 block">Start</label>
                    <input type="time" id="input-start" class="clean-input text-lg">
                </div>
                <div>
                    <div class="flex justify-between items-baseline mb-2">
                        <label id="lbl-end" class="text-[10px] font-bold text-textSub uppercase tracking-widest block">End</label>
                        <label class="flex items-center gap-1.5 cursor-pointer select-none">
                            <input type="checkbox" id="input-next-day" class="w-3 h-3 rounded border-gray-300">
                            <span id="lbl-next-day" class="text-[9px] font-semibold text-textSub uppercase">Next Day</span>
                        </label>
                    </div>
                    <input type="time" id="input-end" class="clean-input text-lg">
                </div>
            </div>

            <div class="space-y-6 mb-6">
                <div>
                    <label id="lbl-notes" class="text-[10px] font-bold text-textSub uppercase tracking-widest mb-2 block">Notes</label>
                    <input type="text" id="input-notes" class="clean-input text-sm" placeholder="...">
                </div>
                <div class="flex items-center gap-4">
                     <label id="lbl-commute" class="text-[10px] font-bold text-textSub uppercase tracking-widest whitespace-nowrap">Commute</label>
                     <input type="range" id="input-commute" min="0" max="120" step="5" value="0" class="w-full h-0.5 bg-gray-200 dark:bg-gray-700 appearance-none rounded cursor-pointer accent-textMain">
                     <span class="text-xs font-medium text-textMain w-10 text-right" id="commute-val">0m</span>
                </div>
            </div>

            <div class="flex flex-col gap-3 pt-6 border-t border-gray-100 dark:border-gray-800">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-6">
                        <label class="flex items-center gap-2 cursor-pointer select-none">
                            <input type="checkbox" id="input-daily" class="rounded border-gray-300" onchange="toggleDaily()">
                            <span id="lbl-daily" class="text-xs font-medium text-textMain">Daily</span>
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer select-none">
                            <input type="checkbox" id="input-repeat" class="rounded border-gray-300" onchange="toggleRepeat()">
                            <span id="lbl-repeat" class="text-xs font-medium text-textSub">Weekly</span>
                        </label>
                    </div>
                    <div id="repeat-settings" class="hidden flex items-center gap-2 opacity-0 transition-opacity duration-300">
                        <span id="lbl-stop" class="text-[10px] text-textSub uppercase">Stop after</span>
                        <input type="number" id="input-repeat-weeks" class="clean-input w-8 text-center py-0 text-xs" placeholder="∞">
                        <span id="lbl-wks" class="text-[10px] text-textSub uppercase">Wks</span>
                    </div>
                </div>
            </div>

            <input type="hidden" id="input-id">
            <input type="hidden" id="input-created"> 
            
            <div class="mt-8 flex gap-4">
                <button onclick="saveEvent()" id="btn-save" class="flex-1 bg-textMain text-bg py-4 rounded-lg text-xs font-bold uppercase tracking-[0.15em] hover:opacity-80 transition-opacity">Save</button>
                <button onclick="deleteEvent()" id="btn-delete" class="px-6 py-4 text-red-400 hover:text-red-600 text-xs font-bold uppercase tracking-[0.15em] transition-colors hidden">Delete</button>
            </div>
        </div>
    </div>

    <script>
        const I18N = {
            'en': { days: ['MON','TUE','WED','THU','FRI','SAT','SUN'], fullDays: ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'], focus: 'Current Focus', free: 'Free Time', today: "TODAY'S PLAN", start: 'Start', end: 'End', notes: 'Notes', commute: 'Commute', day: 'Day of Week', daily: 'Daily', repeat: 'Weekly', stop: 'Stop after', wks: 'Wks', nextDay: 'Next Day', save: 'Save', delete: 'Delete', weekPrefix: 'WEEK', back: 'Back to Today', placeholderTitle: 'Type your task...', placeholderNotes: 'Add details...', confirmDelete: 'Are you sure you want to delete ALL tasks? This cannot be undone.' },
            'zh': { days: ['周一','周二','周三','周四','周五','周六','周日'], fullDays: ['周一','周二','周三','周四','周五','周六','周日'], focus: '当前专注', free: '空闲时间', today: "今日计划", start: '开始', end: '结束', notes: '备注', commute: '路程', day: '选择星期', daily: '每天', repeat: '每周', stop: '重复', wks: '周', nextDay: '次日', save: '保存', delete: '删除', weekPrefix: '第几周', back: '回到本周', placeholderTitle: '输入任务名称...', placeholderNotes: '添加详细信息...', confirmDelete: '确定要删除所有任务吗？此操作无法撤销。' },
            'jp': { days: ['月','火','水','木','金','土','日'], fullDays: ['月曜日','火曜日','水曜日','木曜日','金曜日','土曜日','日曜日'], focus: '現在集中', free: '自由時間', today: "今日の予定", start: '開始', end: '終了', notes: 'メモ', commute: '移動', day: '曜日', daily: '毎日', repeat: '毎週', stop: '期間', wks: '週間', nextDay: '翌日', save: '保存', delete: '削除', weekPrefix: '週', back: '今週に戻る', placeholderTitle: 'タスクを入力...', placeholderNotes: '詳細を追加...', confirmDelete: 'すべてのタスクを削除してもよろしいですか？この操作は取り消せません。' }
        };

        const PALETTE = [
            { light: '#111827', dark: '#f3f4f6' }, { light: '#57534e', dark: '#d6d3d1' },
            { light: '#be123c', dark: '#fb7185' }, { light: '#c2410c', dark: '#fb923c' },
            { light: '#15803d', dark: '#4ade80' }, { light: '#0e7490', dark: '#22d3ee' },
            { light: '#1d4ed8', dark: '#60a5fa' }, { light: '#4338ca', dark: '#818cf8' },
            { light: '#701a75', dark: '#e879f9' }
        ];

        let currentLang = localStorage.getItem('flowweek_lang') || 'en';
        let isDark = localStorage.getItem('flowweek_dark') === 'true';
        let events = JSON.parse(localStorage.getItem('flowweek_ultra_events')) || [];
        let currentViewDate = getMonday(new Date());
        let dragData = { active: false, startYPct: 0, colIndex: null, el: null };

        window.onload = () => {
            const savedWidth = localStorage.getItem('flowweek_sidebar_width');
            if(savedWidth) document.documentElement.style.setProperty('--sidebar-width', savedWidth);
            applyTheme();
            setLang(currentLang);
            initColorPicker();
            initClock();
            setupDrag();
            setupResizer();
            setupModalOverlay();
            document.body.addEventListener('click', closeSelectMenu);
            document.getElementById('input-commute').addEventListener('input', e => {
                document.getElementById('commute-val').innerText = e.target.value + 'm';
            });
        };

        function getMonday(d) { d = new Date(d); d.setHours(0,0,0,0); const day = d.getDay(), diff = d.getDate() - day + (day == 0 ? -6 : 1); return new Date(d.setDate(diff)); }
        function getWeekNumber(d) { d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate())); d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay()||7)); var yearStart = new Date(Date.UTC(d.getUTCFullYear(),0,1)); return Math.ceil((((d-yearStart)/86400000)+1)/7); }
        function toggleTheme() { isDark = !isDark; localStorage.setItem('flowweek_dark', isDark); applyTheme(); initColorPicker(); loadEvents(); }
        function applyTheme() { if(isDark) document.documentElement.classList.add('dark'); else document.documentElement.classList.remove('dark'); }
        function getThemeColor(palEntry) { return isDark ? palEntry.dark : palEntry.light; }
        function findPaletteEntry(hex) { return PALETTE.find(p => p.light === hex || p.dark === hex) || PALETTE[0]; }

        function resetUI() {
            isDark = false; localStorage.setItem('flowweek_dark', 'false'); applyTheme();
            resetToToday();
            document.documentElement.style.setProperty('--sidebar-width', '320px');
            localStorage.removeItem('flowweek_sidebar_width');
            initColorPicker();
            loadEvents();
        }

        function initGrid() {

        function loadEvents() {
            document.querySelectorAll('.event-card, .commute-card').forEach(e => e.remove());
            const viewStartTs = currentViewDate.getTime();
            const oneWeekMs = 7 * 24 * 60 * 60 * 1000;
            events.forEach(ev => {
                let currentWeekCount = 1; let isValidWeek = true;
                if (ev.repeat || ev.daily) {
                     let eventStartWeek = ev.weekStart; if (!eventStartWeek && ev.created) eventStartWeek = getMonday(new Date(ev.created)).getTime();
                     if (eventStartWeek) {
                         const diffWeeks = Math.round((viewStartTs - eventStartWeek) / oneWeekMs);
                         currentWeekCount = diffWeeks + 1;
                         if (currentWeekCount < 1) isValidWeek = false;
                         if (ev.repeatWeeks > 0 && currentWeekCount > ev.repeatWeeks) isValidWeek = false;
                     }
                } else {
                    if (ev.weekStart && ev.weekStart !== viewStartTs) {
                         const prevViewStartTs = new Date(currentViewDate); prevViewStartTs.setDate(prevViewStartTs.getDate()-7);
                         if(ev.weekStart !== prevViewStartTs.getTime()) isValidWeek = false;
                    }
                }
                if (!isValidWeek) return;

                for(let colIndex=0; colIndex<7; colIndex++) {
                    const col = document.querySelector(`.day-column[data-day="${colIndex}"]`);
                    if(!col) continue;
                    
                    let shouldRenderHead = false;
                    if(ev.daily) shouldRenderHead = true;
                    else if(ev.repeat) { if(ev.dayIndex === colIndex) shouldRenderHead = true; }
                    else { if(ev.weekStart === viewStartTs && ev.dayIndex === colIndex) shouldRenderHead = true; }

                    if(shouldRenderHead) {
                        const [sH, sM] = ev.start.split(':').map(Number); const [eH, eM] = ev.end.split(':').map(Number);
                        let start = sH*60 + sM; let end = eH*60 + eM; if(ev.nextDay) end += 1440;
                        const displayHeight = Math.min(end, 1440) - start;
                        renderEventBlock(col, start, displayHeight, ev, false, currentWeekCount, colIndex);
                        if(ev.commute > 0) {
                            let cStart = start - ev.commute;
                            if (cStart < 0) {
                                renderCommuteBlock(col, 0, start);
                                const prevDayIdx = (colIndex - 1 + 7) % 7;
                                let prevCol = document.querySelector(`.day-column[data-day="${prevDayIdx}"]`);
                                if(prevCol) renderCommuteBlock(prevCol, 1440 + cStart, Math.abs(cStart));
                            } else renderCommuteBlock(col, cStart, ev.commute);
                        }
                    }
                    if(ev.nextDay) {
                        let shouldRenderTail = false;
                        const prevDayIndex = (colIndex - 1 + 7) % 7;
                        if(ev.daily) shouldRenderTail = true;
                        else if(ev.repeat) { if(ev.dayIndex === prevDayIndex) shouldRenderTail = true; }
                        else {
                            if(colIndex > 0) { if(ev.weekStart === viewStartTs && ev.dayIndex === prevDayIndex) shouldRenderTail = true; }
                            else { const prevViewStartTs = new Date(currentViewDate); prevViewStartTs.setDate(prevViewStartTs.getDate()-7); if(ev.weekStart === prevViewStartTs.getTime() && ev.dayIndex === 6) shouldRenderTail = true; }
                        }
                        if(shouldRenderTail) {
                            const [eH, eM] = ev.end.split(':').map(Number);
                            renderEventBlock(col, 0, eH*60 + eM, ev, true, currentWeekCount, colIndex);
                        }
                    }
                }
            });
        }

        function renderEventBlock(col, topMin, heightMin, ev, isTail, weekCount, colIndex) {
            if(heightMin <= 0) return;
            const top = (topMin / 1440) * 100;
            const height = (heightMin / 1440) * 100;
            const pEntry = findPaletteEntry(ev.color);
            const color = getThemeColor(pEntry);
            const el = document.createElement('div');
            el.className = 'event-card absolute w-[94%] left-[3%] z-10 flex flex-col justify-center px-3 py-1 overflow-hidden transition-all cursor-pointer hover:shadow-md bg-card';
            el.style.top = `${top}%`; el.style.height = `${height}%`;
            el.style.backgroundColor = hexToRgba(color, 0.15); el.style.borderLeft = `3px solid ${color}`; el.style.color = color;
            el.dataset.eventId = ev.id;
            if(isTail) { el.style.borderTopLeftRadius='0'; el.style.borderTopRightRadius='0'; el.style.opacity='0.8'; }
            let icon = ''; let countInfo = '';
            if(ev.repeat || ev.daily) { icon = '⟳'; if(ev.daily) icon += 'D'; if(ev.repeatWeeks > 0) countInfo = `<span class="text-[9px] font-bold opacity-100 bg-black/5 dark:bg-white/10 px-1 rounded ml-1">${weekCount}/${ev.repeatWeeks}</span>`; }
            if(isTail) icon += ' ↳';
            el.innerHTML = `<div class="flex items-center justify-between w-full"><div class="font-medium text-[11px] leading-tight truncate flex-1">${ev.title} <span class="opacity-50 text-[9px]">${icon}</span></div>${countInfo}</div>${height > 2.5 ? `<div class="text-[9px] opacity-60 font-light truncate mt-0.5">${isTail ? 'Ends' : ev.start} - ${isTail ? ev.end : (ev.nextDay ? '...' : ev.end)}</div>` : ''}`;
            el.onclick = e => { e.stopPropagation(); handleEventClick(ev, colIndex, e); };
            col.appendChild(el);
        }

        function handleEventClick(targetEv, colIndex, mouseEvent) {
            const col = document.querySelector(`.day-column[data-day="${colIndex}"]`);
            const cards = Array.from(col.querySelectorAll('.event-card'));
            const getBounds = (el) => { const t = parseFloat(el.style.top); const h = parseFloat(el.style.height); return { start: t, end: t + h }; }
            const clickedBounds = getBounds(mouseEvent.currentTarget);
            const overlappingCards = cards.filter(card => {
                if (card === mouseEvent.currentTarget) return true;
                const b = getBounds(card);
                return Math.max(clickedBounds.start, b.start) < Math.min(clickedBounds.end, b.end);
            });
            if (overlappingCards.length > 1) showSelectMenu(overlappingCards, mouseEvent.clientX, mouseEvent.clientY);
            else openModal(targetEv);
        }

        function renderCommuteBlock(col, startMin, duration) {
            const cTop = (startMin/1440)*100;

            cel.className = 'commute-card absolute w-[94%] left-[3%] z-0 flex items-end justify-center pb-1 text-[9px] text-textSub';

        function initClock() {
            const update = () => {
                const now = new Date();
                const h = now.getHours(); const m = now.getMinutes(); const totalMin = h*60 + m;
                document.getElementById('clock-display').innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}`;
                const todayMidnight = getMonday(new Date());
                const viewMidnight = new Date(currentViewDate); viewMidnight.setHours(0,0,0,0);
                const isCurrentWeek = todayMidnight.getTime() === viewMidnight.getTime();
                const line = document.getElementById('red-line');
                if(isCurrentWeek) { const pct = (totalMin/1440)*100; line.style.display = 'block'; line.style.top = `${pct}%`; } else { line.style.display = 'none'; }

        function renderTodoList(nowMin) {
            const list = document.getElementById('todays-list');
            list.innerHTML = '';
            const todayIndex = (new Date().getDay() + 6) % 7;
            const todaysEvents = events.filter(e => {
                if(e.daily) return true;
                if(e.repeat && e.dayIndex === todayIndex) return true;
                if(e.weekStart === getMonday(new Date()).getTime() && e.dayIndex === todayIndex) return true;
                if(e.nextDay) {
                    const prevDay = (todayIndex - 1 + 7) % 7;
                    if(e.daily || (e.repeat && e.dayIndex === prevDay)) return true;
                    if(!e.repeat && !e.daily && e.dayIndex === prevDay) { if (e.weekStart === getMonday(new Date()).getTime()) return true; }
                }
                return false;
            }).sort((a, b) => {
                const [h1, m1] = a.start.split(':').map(Number); const [h2, m2] = b.start.split(':').map(Number);
                return (h1*60+m1) - (h2*60+m2);
            });
            if(todaysEvents.length === 0) { list.innerHTML = `<div class="text-[10px] text-textSub text-center mt-4">No tasks today</div>`; return; }
            todaysEvents.forEach(e => {
                const [sH, sM] = e.start.split(':').map(Number); const [eH, eM] = e.end.split(':').map(Number);
                let start = sH*60+sM; let end = eH*60+eM; if(e.nextDay) end += 1440;
                let status = 'future';
                if(nowMin >= end) status = 'past'; else if(nowMin >= start && nowMin < end) status = 'current';
                const item = document.createElement('div');
                item.className = `task-item ${status}`;
                item.innerHTML = `<span class="truncate pr-2">${e.title}</span><span class="font-mono opacity-80">${e.start}</span>`;
                list.appendChild(item);
            });
        }

        function updateStatus(sysDay, nowMin) {
            const dayIndex = (sysDay + 6) % 7;
            const active = events.find(e => {
                const [sH, sM] = e.start.split(':').map(Number); const [eH, eM] = e.end.split(':').map(Number);
                let s = sH*60+sM; let end = eH*60+eM; if(e.nextDay) end += 1440;
                let isTodayActive = (e.daily || e.dayIndex === dayIndex) && (nowMin >= s && nowMin < end);
                if(isTodayActive) return true;
                if(e.nextDay) {
                    const prevDay = (dayIndex - 1 + 7) % 7;
                    const startedYesterday = (e.daily || e.dayIndex === prevDay);
                    if(startedYesterday) { const tailEnd = end - 1440; if(nowMin < tailEnd) return true; }
                }
                return false;
            });
            const wrapper = document.getElementById('live-status-wrapper');
            const title = document.getElementById('current-task-title');
            const bar = document.getElementById('current-progress');
            const card = document.getElementById('current-card');
            if(active) {
                wrapper.style.opacity = '1'; title.innerText = active.title; title.style.color = 'var(--text-main)'; 
                document.getElementById('current-time-range').innerText = `${active.start} - ${active.end}`;
                const [sH, sM] = active.start.split(':').map(Number); const [eH, eM] = active.end.split(':').map(Number);
                let start = sH*60+sM; let end = eH*60+eM; if(active.nextDay) end += 1440;
                let currentProgressMin = nowMin; if(nowMin < (end-1440)) currentProgressMin = nowMin + 1440;
                const total = end - start; const passed = currentProgressMin - start;
                const pct = Math.min(100, Math.max(0, (passed/total)*100));
                const pEntry = findPaletteEntry(active.color); const color = getThemeColor(pEntry);
                bar.style.width = `${pct}%`; bar.style.backgroundColor = color;
                card.style.paddingLeft = '16px'; card.style.borderLeftColor = color;
                document.getElementById('current-remaining').innerText = `-${Math.floor(total - passed)}m`;
            } else {
                wrapper.style.opacity = '0'; title.innerText = I18N[currentLang].free; title.style.color = 'var(--text-sub)';
                document.getElementById('current-time-range').innerText = "";
                bar.style.width = "0%"; card.style.paddingLeft = '0px'; card.style.borderLeftColor = 'transparent';
                document.getElementById('current-remaining').innerText = "";
            }
        }

        function setupModalOverlay() { const o=document.getElementById('modal-overlay'); o.addEventListener('click',(e)=>{ if(e.target===o)closeModal(); }); }
        function setupDrag() { const g=document.getElementById('calendar-grid'); g.addEventListener('mousedown',e=>{ if(e.button!==0)return; const col=e.target.closest('.day-column'); if(!col||e.target.closest('.event-card'))return; dragData.active=true; dragData.colIndex=col.dataset.day; const r=col.getBoundingClientRect(); dragData.startYPct=((e.clientY-r.top)/col.clientHeight)*100; dragData.el=document.createElement('div'); dragData.el.className='absolute bg-textMain/10 border-l-2 border-textMain/30 w-[94%] left-[3%] z-20'; dragData.el.style.top=`${dragData.startYPct}%`; dragData.el.style.height='0%'; 
        // Add Time Labels to Drag Element
        dragData.el.innerHTML = `<span id="drag-s" class="absolute -top-4 left-0 text-[9px] font-bold bg-card text-textMain px-1 rounded shadow border border-grid"></span><span id="drag-e" class="absolute -bottom-4 right-0 text-[9px] font-bold bg-card text-textMain px-1 rounded shadow border border-grid"></span>`;
        col.appendChild(dragData.el); }); window.addEventListener('mousemove',e=>{ if(!dragData.active)return; const col=dragData.el.parentElement; const h=col.clientHeight; let y=e.clientY-col.getBoundingClientRect().top; if(y<0)y=0; if(y>h)y=h; const cur=(y/h)*100; dragData.el.style.top=`${Math.min(dragData.startYPct,cur)}%`; dragData.el.style.height=`${Math.abs(cur-dragData.startYPct)}%`; 
        // Update Labels
        const topPct = Math.min(dragData.startYPct, cur); const heightPct = Math.abs(cur-dragData.startYPct);
        const sMin = (topPct/100)*1440; const eMin = ((topPct+heightPct)/100)*1440;
        const snap = m => Math.round(m/15)*15;
        dragData.el.querySelector('#drag-s').innerText = minToTime(snap(sMin));
        dragData.el.querySelector('#drag-e').innerText = minToTime(snap(eMin));
        }); window.addEventListener('mouseup',()=>{ if(!dragData.active)return; dragData.active=false; if(dragData.el){ const t=parseFloat(dragData.el.style.top); const h=parseFloat(dragData.el.style.height); dragData.el.remove(); if(h>0.5)openCreateModal(dragData.colIndex,(t/100)*1440,((t+h)/100)*1440); } }); }
        function hexToRgba(hex,a){ let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16); return `rgba(${r},${g},${b},${a})`; }
        function minToTime(m){ let h=Math.floor(m/60),min=Math.round(m%60); if(h>23)h=23; return `${h.toString().padStart(2,'0')}:${min.toString().padStart(2,'0')}`; }
    </script>
</body>
